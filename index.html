<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heaven Mode 🎀</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#fff0f5,#ffe4ec);
text-align:center;
overflow-x:hidden;
transition:1.5s;
}

/* Title */
h1{
font-family:'Playfair Display',serif;
color:#d63384;
margin-top:30px;
}

/* Photo */
#photo img{
width:230px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.2);
margin-top:20px;
}

/* Music */
#spotifyPlayer{
margin-top:35px;
border-radius:12px;
}

/* Gift */
.gift{
font-size:75px;
margin-top:45px;
cursor:pointer;
transition:0.4s;
}

.gift:hover{
transform:scale(1.1);
filter:drop-shadow(0 0 20px #ff69b4);
}

/* Panda Section */
#pandaSection{
display:none;
flex-direction:column;
align-items:center;
margin-top:40px;
position:relative;
}

/* Light Rays */
#rays{
position:absolute;
width:250px;
height:250px;
background:radial-gradient(circle, rgba(255,182,217,0.6) 0%, transparent 70%);
border-radius:50%;
animation:rotate 18s linear infinite;
z-index:0;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* Panda */
#panda{
font-size:95px;
z-index:1;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* Romantic Text */
#romanticText{
margin-top:25px;
font-family:'Playfair Display',serif;
font-size:18px;
color:#d63384;
min-height:60px;
}

/* Falling Love Symbols */
.love{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<h1>Good Morning Sundhaariiii 🎀</h1>

<div id="photo">
<img src="Picsart_26-02-22_07-22-51-625.jpg">
</div>

<iframe id="spotifyPlayer"
src="https://open.spotify.com/embed/track/6G9YlbU3ByPJQvOFDRdwyM"
width="85%" height="80"
frameBorder="0"
allow="autoplay; encrypted-media">
</iframe>

<div class="gift" onclick="openGift()">🎁</div>

<div id="pandaSection">
<div id="rays"></div>
<div id="panda">🐼</div>
<div id="romanticText"></div>
</div>

<script>

/* Open Gift */
function openGift(){
let section=document.getElementById("pandaSection");
section.style.display="flex";

typeText("You are my heaven, my softest love, my forever angel 💖🎀");

document.body.style.background="linear-gradient(180deg,#ffe6f2,#fff0f8)";
}

/* Typing Animation */
function typeText(msg){
let i=0;
let el=document.getElementById("romanticText");
el.innerHTML="";
function typing(){
if(i<msg.length){
el.innerHTML+=msg.charAt(i);
i++;
setTimeout(typing,40);
}
}
typing();
}

/* Falling Love Animation */
setInterval(()=>{
let love=document.createElement("div");
love.className="love";
love.innerHTML="💕";
love.style.left=Math.random()*100+"vw";
love.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(love);
setTimeout(()=>{love.remove();},10000);
},700);

</script>

</body>
</html>
