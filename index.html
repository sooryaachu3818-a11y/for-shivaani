<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sundhaariiii 🎀</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
padding:0;
overflow:hidden;
background:linear-gradient(180deg,#fff0f5,#ffe4ec);
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

/* Glass Blur Card */
.card{
backdrop-filter: blur(15px);
background: rgba(255,255,255,0.4);
padding:40px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
transition:1s ease;
}

h1{
font-family:'Playfair Display',serif;
color:#d63384;
font-size:32px;
transition:1s ease;
}

#tap{
margin-top:15px;
color:#555;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.move{
transform:translateX(250px);
opacity:0;
}

/* Photo */
#photo{
display:none;
margin-top:20px;
animation:fadeIn 2s ease forwards;
}

#photo img{
width:260px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
animation:zoom 8s infinite alternate ease-in-out;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

/* Final Text */
#final{
display:none;
margin-top:20px;
font-size:18px;
color:#c2185b;
animation:fadeIn 3s ease forwards;
}

/* Falling petals */
.petal{
position:absolute;
top:-10px;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

/* Butterfly */
.butterfly{
position:absolute;
font-size:28px;
animation:fly 15s linear infinite;
}

@keyframes fly{
0%{left:-10%; top:60%;}
50%{left:50%; top:30%;}
100%{left:110%; top:50%;}
}
</style>
</head>

<body>

<div class="card">
<h1 id="title">Good Morning Sundhaariiii 🎀</h1>
<div id="tap" onclick="startLove()">Tap Me 💕</div>

<div id="photo">
<img src="Picsart_26-02-22_07-22-51-625.jpg">
</div>

<div id="final">
You are my most beautiful love in this world 🌸🎀 <br>
Forever mine 🦋
</div>
</div>

<audio id="music" src="her.mp3"></audio>

<div class="butterfly">🦋</div>

<script>
function startLove(){
document.getElementById("title").classList.add("move");
document.getElementById("tap").style.display="none";

document.getElementById("music").play();

setTimeout(()=>{
document.getElementById("photo").style.display="block";
},1200);

setTimeout(()=>{
document.getElementById("final").style.display="block";
},3000);
}

/* Falling petals generator */
setInterval(()=>{
const petal=document.createElement("div");
petal.className="petal";
petal.innerHTML="🌸";
petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(petal);

setTimeout(()=>{
petal.remove();
},10000);
},500);
</script>

</body>
</html>
