<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #ffe6eb, #fff5f7);
    font-family: 'Poppins', sans-serif;
    text-align: center;
    padding: 20px;
}

/* Heading */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 38px;
    color: #ff4d6d;
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    color: #777;
    margin-bottom: 20px;
}

/* Image */
img {
    width: 100%;
    max-width: 380px;
    border-radius: 20px;
    box-shadow: 0 15px 40px rgba(255, 105, 135, 0.3);
    margin-bottom: 20px;
}

/* Message */
.message {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
    margin-bottom: 20px;
}

/* Button */
.button {
    padding: 12px 25px;
    border: none;
    background: #ff4d6d;
    color: white;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(255,77,109,0.4);
    transition: 0.3s;
}

.button:hover {
    transform: scale(1.05);
    background: #ff1e4d;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    color: rgba(255, 105, 135, 0.6);
    animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Good Morning ❤️</h1>
<div class="subtitle">To the most special person in my world</div>

<img src="Picsart_26-02-22_07-22-51-625.jpg" alt="Her Photo">

<div class="message">
I’m truly sorry for falling asleep last night.<br><br>
You mean more to me than I can explain, and I never want you to feel ignored or unimportant.<br><br>
I promise to always do better for you.
</div>

<button class="button" onclick="alert('You make my world brighter every single day ❤️')">
Tap Me 💕
</button>

<script>
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 8000);
}, 600);
</script>

</body>
</html>
