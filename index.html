<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sundhaariiii 🎀</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
padding:0;
overflow:hidden;
background:linear-gradient(180deg,#fff0f5,#ffe4ec);
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
transition:2s;
}

/* Romantic Card */
.card{
backdrop-filter: blur(15px);
background: rgba(255,255,255,0.4);
padding:35px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
position:relative;
z-index:2;
}

h1{
font-family:'Playfair Display',serif;
color:#d63384;
font-size:26px;
animation:heartbeat 2s infinite;
}

@keyframes heartbeat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.05);}
}

#tap{
margin-top:15px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

.move{
transform:translateX(250px);
opacity:0;
transition:1s;
}

#photo{
display:none;
margin-top:20px;
}

#photo img{
width:220px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
animation:zoom 8s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

#musicBox{
display:none;
margin-top:15px;
}

/* Falling Hearts */
.heart{
position:absolute;
top:-10px;
color:#ff4d88;
animation:fall linear infinite;
font-size:18px;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* Gift Box */
#giftSection{
display:none;
margin-top:25px;
}

.gift{
font-size:60px;
cursor:pointer;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

#giftItems{
display:none;
margin-top:15px;
font-size:20px;
}
</style>
</head>

<body>

<div class="card">
<h1 id="title">Good Morning Sundhaariiii 🎀</h1>
<div id="tap" onclick="startLove()">Tap Me 💕</div>

<div id="photo">
<img src="Picsart_26-02-22_07-22-51-625.jpg">
</div>

<div id="musicBox">
<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/6G9YlbU3ByPJQvOFDRdwyM"
width="100%" height="80" frameBorder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<div id="giftSection">
<div class="gift" onclick="openGift()">🎁</div>
<div id="giftItems">
🐼 Panda Toy<br>
✏️ Kawaii Pencils<br>
🎀 Cute Erasers<br>
📎 Lovely Sharpeners<br>
💖 My Heart For You
</div>
</div>

</div>

<script>
function startLove(){
document.getElementById("title").classList.add("move");
document.getElementById("tap").style.display="none";

setTimeout(()=>{
document.getElementById("photo").style.display="block";
},1200);

setTimeout(()=>{
document.getElementById("musicBox").style.display="block";
document.body.style.background="linear-gradient(180deg,#ffe6f2,#fff0f8)";
},2500);

setTimeout(()=>{
document.getElementById("giftSection").style.display="block";
},4000);
}

function openGift(){
document.getElementById("giftItems").style.display="block";
}

/* Falling Hearts */
setInterval(()=>{
const h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(h);
setTimeout(()=>{h.remove();},10000);
},400);
</script>

</body>
</html>
