<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sundhaariiii 🎀</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
padding:0;
overflow:hidden;
background:linear-gradient(180deg,#fff0f5,#ffe4ec);
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
transition:2s;
}

/* Card */
.card{
backdrop-filter: blur(18px);
background: rgba(255,255,255,0.45);
padding:35px;
border-radius:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
position:relative;
z-index:2;
width:90%;
max-width:350px;
}

/* Title */
h1{
font-family:'Playfair Display',serif;
color:#d63384;
font-size:24px;
animation:heartbeat 2s infinite;
transition:1s;
}

@keyframes heartbeat{
0%,100%{transform:scale(1);}
50%{transform:scale(1.05);}
}

#tap{
margin-top:15px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

.move{
transform:translateX(250px);
opacity:0;
}

/* Photo */
#photo{
display:none;
margin-top:15px;
animation:fadeIn 2s forwards;
}

#photo img{
width:200px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.25);
animation:zoom 8s infinite alternate;
}

@keyframes zoom{
from{transform:scale(1);}
to{transform:scale(1.08);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* Music */
#musicBox{
display:none;
margin-top:15px;
}

/* Falling Love Symbols */
.love{
position:absolute;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* Butterfly */
.butterfly{
position:absolute;
font-size:24px;
animation:fly 20s linear infinite;
}

@keyframes fly{
0%{left:-10%; top:60%;}
50%{left:50%; top:30%;}
100%{left:110%; top:50%;}
}

/* Gift */
#giftSection{
display:none;
margin-top:20px;
}

.gift{
font-size:60px;
cursor:pointer;
position:relative;
}

.lid{
position:absolute;
top:-20px;
left:0;
right:0;
font-size:40px;
transition:1s;
}

.open .lid{
transform:translateY(-25px) rotate(-20deg);
}

#items{
display:none;
margin-top:10px;
font-size:18px;
}

.item{
opacity:0;
animation:appear 1s forwards;
}

@keyframes appear{
to{opacity:1;}
}

/* Ribbons */
.ribbon{
position:absolute;
font-size:18px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-100vh);}
}
</style>
</head>

<body>

<div class="card">
<h1 id="title">Good Morning Sundhaariiii 🎀</h1>
<div id="tap" onclick="startLove()">Tap Me 💕</div>

<div id="photo">
<img src="Picsart_26-02-22_07-22-51-625.jpg">
</div>

<div id="musicBox">
<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/6G9YlbU3ByPJQvOFDRdwyM"
width="100%" height="80" frameBorder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<div id="giftSection">
<div class="gift" onclick="openGift(this)">
<div class="lid">🎀</div>
🎁
</div>

<div id="items">
<div class="item">🐼 Panda Toy</div>
<div class="item">✏️ Kawaii Pencils</div>
<div class="item">🎀 Cute Erasers</div>
<div class="item">📎 Lovely Sharpeners</div>
<div class="item">💖 My Whole Heart</div>
</div>
</div>

</div>

<div class="butterfly">🦋</div>

<script>
function startLove(){
document.getElementById("title").classList.add("move");
document.getElementById("tap").style.display="none";

setTimeout(()=>{
document.getElementById("photo").style.display="block";
},1200);

setTimeout(()=>{
document.getElementById("musicBox").style.display="block";
document.body.style.background="linear-gradient(180deg,#ffe6f2,#fff0f8)";
},2500);

setTimeout(()=>{
document.getElementById("giftSection").style.display="block";
},4000);
}

function openGift(el){
el.classList.add("open");
document.getElementById("items").style.display="block";

let items=document.querySelectorAll(".item");
items.forEach((item,i)=>{
item.style.animationDelay=(i*0.6)+"s";
});
}

/* Falling Love Symbols */
setInterval(()=>{
const l=document.createElement("div");
l.className="love";
l.innerHTML="💕";
l.style.left=Math.random()*100+"vw";
l.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(l);
setTimeout(()=>{l.remove();},10000);
},400);

/* Floating Ribbons */
setInterval(()=>{
const r=document.createElement("div");
r.className="ribbon";
r.innerHTML="🎀";
r.style.left=Math.random()*100+"vw";
document.body.appendChild(r);
setTimeout(()=>{r.remove();},6000);
},800);
</script>

</body>
</html>
