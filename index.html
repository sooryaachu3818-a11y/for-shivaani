<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Angel 🎀</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
padding:0;
overflow:hidden;
background:linear-gradient(180deg,#fff0f5,#ffe4ec);
font-family:'Poppins',sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
transition:2s;
}

/* Glass Card */
.card{
backdrop-filter: blur(20px);
background: rgba(255,255,255,0.45);
padding:35px;
border-radius:30px;
box-shadow:0 30px 80px rgba(0,0,0,0.15);
position:relative;
z-index:2;
width:90%;
max-width:350px;
}

/* Title */
h1{
font-family:'Playfair Display',serif;
color:#d63384;
font-size:24px;
animation:glow 2s infinite alternate;
transition:1s;
}

@keyframes glow{
from{ text-shadow:0 0 5px #ffb6d9;}
to{ text-shadow:0 0 20px #ff69b4;}
}

#tap{
margin-top:15px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

.move{
transform:translateX(250px);
opacity:0;
}

/* Photo */
#photo{
display:none;
margin-top:15px;
animation:fadeIn 2s forwards;
}

#photo img{
width:200px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
animation:softZoom 10s infinite alternate;
}

@keyframes softZoom{
from{transform:scale(1);}
to{transform:scale(1.07);}
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

/* Music */
#musicBox{
display:none;
margin-top:15px;
}

/* Falling Hearts */
.love{
position:absolute;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* Butterfly */
.butterfly{
position:absolute;
font-size:24px;
animation:fly 25s linear infinite;
}

@keyframes fly{
0%{left:-10%; top:60%;}
50%{left:50%; top:25%;}
100%{left:110%; top:50%;}
}

/* Gift */
#giftSection{
display:none;
margin-top:20px;
}

.gift{
font-size:70px;
cursor:pointer;
position:relative;
transition:1s;
}

.lid{
position:absolute;
top:-25px;
left:0;
right:0;
font-size:45px;
transition:1s;
}

.open .lid{
transform:translateY(-30px) rotate(-20deg);
}

/* Panda */
#panda{
display:none;
margin-top:15px;
font-size:70px;
animation:bounce 2s infinite;
filter:drop-shadow(0 0 15px #ffb6d9);
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}

/* Sparkles */
.sparkle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}
</style>
</head>

<body>

<div class="card">
<h1 id="title">Good Morning Sundhaariiii 🎀</h1>
<div id="tap" onclick="startLove()">Tap Me 💕</div>

<div id="photo">
<img src="Picsart_26-02-22_07-22-51-625.jpg">
</div>

<div id="musicBox">
<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/track/6G9YlbU3ByPJQvOFDRdwyM"
width="100%" height="80" frameBorder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<div id="giftSection">
<div class="gift" onclick="openGift(this)">
<div class="lid">🎀</div>
🎁
</div>
<div id="panda">🐼</div>
</div>

</div>

<div class="butterfly">🦋</div>

<script>
function startLove(){
document.getElementById("title").classList.add("move");
document.getElementById("tap").style.display="none";

setTimeout(()=>{
document.getElementById("photo").style.display="block";
},1200);

setTimeout(()=>{
document.getElementById("musicBox").style.display="block";
document.body.style.background="linear-gradient(180deg,#ffe6f2,#fff0f8)";
},2500);

setTimeout(()=>{
document.getElementById("giftSection").style.display="block";
},4000);
}

function openGift(el){
el.classList.add("open");
document.getElementById("panda").style.display="block";
}

/* Falling Love Symbols */
setInterval(()=>{
const l=document.createElement("div");
l.className="love";
l.innerHTML="💖";
l.style.left=Math.random()*100+"vw";
l.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(l);
setTimeout(()=>{l.remove();},10000);
},400);

/* Sparkles */
setInterval(()=>{
const s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
setTimeout(()=>{s.remove();},3000);
},300);
</script>

</body>
</html>
