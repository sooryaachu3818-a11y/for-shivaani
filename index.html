<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Angel 🎀</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
padding:0;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:linear-gradient(180deg,#fff0f5,#ffe4ec);
transition:2s;
}

/* SLIDER */
.slider{
display:flex;
width:200%;
height:100vh;
transition:1s ease;
}

.slide{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

/* TITLE */
h1{
font-family:'Playfair Display',serif;
color:#d63384;
font-size:24px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 5px #ffb6d9;}
to{ text-shadow:0 0 20px #ff69b4;}
}

#tap{
margin-top:20px;
cursor:pointer;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

/* PHOTO */
#photo{
display:none;
margin-top:40px;
}

#photo img{
width:220px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
animation:softZoom 10s infinite alternate;
}

@keyframes softZoom{
from{transform:scale(1);}
to{transform:scale(1.07);}
}

/* MUSIC BUTTON */
#musicBtn{
display:none;
margin-top:25px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff69b4;
color:white;
cursor:pointer;
}

/* PETALS */
.petal{
position:absolute;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

/* GIFT SLIDE */
#giftSlide{
position:relative;
}

/* PANDA ABOVE GIFT */
#panda{
font-size:80px;
display:none;
margin-bottom:20px;
filter:drop-shadow(0 0 15px #ffb6d9);
}

/* fluffy bounce */
.bounceSlow{
animation:bounceSlow 2s infinite;
}
.bounceFast{
animation:bounceFast 0.6s infinite;
}

@keyframes bounceSlow{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

@keyframes bounceFast{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-18px);}
}

/* GIFT */
.gift{
font-size:70px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="slider" id="slider">

<!-- SLIDE 1 -->
<div class="slide">
<h1>Good Morning Sundhaariiii 🎀</h1>
<div id="tap" onclick="startLove()">Tap Me 💕</div>

<div id="photo">
<img src="Picsart_26-02-22_07-22-51-625.jpg">
</div>

<button id="musicBtn" onclick="playSong()">🎵 Play Our Song</button>

<iframe id="spotifyPlayer"
style="display:none; margin-top:15px; border-radius:12px;"
width="80%" height="80"
frameBorder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>

</div>

<!-- SLIDE 2 -->
<div class="slide" id="giftSlide">
<div id="panda">🐼</div>
<div class="gift" onclick="openGift()">🎁</div>
</div>

</div>

<script>

function startLove(){
document.getElementById("photo").style.display="block";
document.getElementById("musicBtn").style.display="inline-block";
}

/* PLAY SONG */
function playSong(){
const player=document.getElementById("spotifyPlayer");
player.src="https://open.spotify.com/embed/track/6G9YlbU3ByPJQvOFDRdwyM?utm_source=generator&autoplay=1";
player.style.display="block";

/* petals react faster */
petalSpeed=200;

/* change background */
document.body.style.background="linear-gradient(180deg,#ffe6f2,#fff0f8)";

/* slide to gift after 3 sec */
setTimeout(()=>{
document.getElementById("slider").style.transform="translateX(-100vw)";
},3000);
}

/* OPEN GIFT */
function openGift(){
document.getElementById("panda").style.display="block";
document.getElementById("panda").classList.add("bounceFast");
}

/* PETALS */
let petalSpeed=600;

setInterval(()=>{
const p=document.createElement("div");
p.className="petal";
p.innerHTML="💕";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(p);
setTimeout(()=>{p.remove();},10000);
},petalSpeed);

</script>

</body>
</html>
