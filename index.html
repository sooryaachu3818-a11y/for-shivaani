<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Sundhaariiii 💖</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Georgia', serif;
    text-align:center;
    background: linear-gradient(to bottom,#ffe6f0,#ffd6eb);
    overflow-x:hidden;
}

/* Falling Hearts */
.heart{
    position:fixed;
    top:-10px;
    font-size:20px;
    animation:fall linear infinite;
}
@keyframes fall{
    to{
        transform:translateY(100vh);
    }
}

/* Heading */
h1{
    margin-top:120px;
    font-size:38px;
    color:#ff1493;
    text-shadow:0 4px 15px rgba(255,20,147,0.4);
}

/* Pinterest Button */
.pinterest-btn {
    margin-top: 25px;
    padding: 14px 35px;
    font-size: 18px;
    font-weight: 600;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, #ff4da6, #ff80bf);
    color: white;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(255, 77, 166, 0.4);
    transition: all 0.3s ease;
    animation: floatButton 2s ease-in-out infinite;
}

.pinterest-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 15px 35px rgba(255, 77, 166, 0.6);
}

.pinterest-btn:active {
    transform: scale(0.95);
}

.pinterest-btn::before {
    content: "";
    position: absolute;
    width: 300%;
    height: 300%;
    top: -100%;
    left: -100%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 10%, transparent 60%);
    transform: rotate(25deg);
    animation: shine 3s infinite;
}

@keyframes shine {
    0% { transform: translateX(-100%) rotate(25deg); }
    100% { transform: translateX(100%) rotate(25deg); }
}

@keyframes floatButton {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}

/* Image Section */
#photoSection{
    display:none;
    margin-top:40px;
}

#photoSection img{
    width:85%;
    max-width:350px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* Play Song Button */
.song-btn{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:40px;
    font-size:16px;
    color:white;
    background:linear-gradient(135deg,#ff4da6,#ff80bf);
    box-shadow:0 8px 20px rgba(255,20,147,0.4);
}

</style>
</head>

<body>

<h1>Good Morning Sundhaariiii 🎀</h1>

<button class="pinterest-btn" onclick="showPhoto()">
💗 Tap Me 💗
</button>

<div id="photoSection">
    <img src="Picsart_26-02-22_07-22-51-625.jpg">
    <br>
    <button class="song-btn" onclick="playSong()">🎵 Play Our Song</button>
</div>

<audio id="music">
    <source src="her.mp3" type="audio/mpeg">
</audio>

<script>
/* Show Photo */
function showPhoto(){
    document.getElementById("photoSection").style.display="block";
}

/* Play Music */
function playSong(){
    document.getElementById("music").play();
}

/* Create Falling Hearts */
for(let i=0;i<20;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(heart);
}
</script>

</body>
</html>
